<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador - Direccoin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; 
            background: #F8F6F1; 
            color: #1A1814; 
        }
        
        .header {
            background: #FFFFFF;
            border-bottom: 1px solid #E0DBD0;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header img {
            width: 36px; height: 36px;
            border-radius: 50%; object-fit: cover;
            border: 2px solid #B8860B;
        }
        .header h1 { font-size: 20px; color: #B8860B; letter-spacing: 1px; }
        .header a { 
            color: #8B8270; text-decoration: none; 
            font-size: 13px; margin-left: auto;
        }
        .header a:hover { color: #B8860B; }
        
        .search {
            max-width: 800px; margin: 20px auto; padding: 0 20px;
        }
        .search input {
            width: 100%; padding: 16px 20px; font-size: 15px;
            border: 2px solid #E0DBD0; border-radius: 14px;
            background: #FFFFFF; color: #1A1814;
        }
        .search input:focus { outline: none; border-color: #B8860B; }
        
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px 40px; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 14px; margin-bottom: 30px;
        }
        .stat-card {
            background: #FFFFFF; border: 1px solid #E0DBD0;
            border-radius: 14px; padding: 20px; text-align: center;
        }
        .stat-card .label { font-size: 11px; color: #8B8270; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card .value { font-size: 22px; color: #B8860B; font-weight: 800; margin-top: 4px; }
        
        .section-title {
            font-size: 13px; font-weight: 700; color: #B8860B;
            letter-spacing: 2px; margin-bottom: 12px;
        }
        
        .bloque {
            background: #FFFFFF; border: 1px solid #E0DBD0;
            border-radius: 12px; padding: 16px 20px; margin-bottom: 10px;
            display: grid;
            grid-template-columns: 70px 1fr 80px 80px 100px;
            align-items: center; gap: 14px;
        }
        .bloque:hover { border-color: #DAA520; }
        .bloque .indice { color: #B8860B; font-size: 16px; font-weight: 800; }
        .bloque .hash { color: #6B6355; font-size: 13px; font-family: 'Courier New', monospace; }
        .bloque .txs { color: #2E7D32; font-size: 14px; font-weight: 600; }
        .bloque .tiempo { color: #8B8270; font-size: 12px; }
        .bloque .recompensa { color: #DAA520; font-size: 13px; font-weight: 600; text-align: right; }
        
        .tx {
            background: #FFFFFF; border: 1px solid #E0DBD0;
            border-radius: 10px; padding: 12px 16px; margin-bottom: 8px;
            display: grid;
            grid-template-columns: 1fr 1fr 100px;
            align-items: center; gap: 10px;
        }
        .tx .txid { color: #6B6355; font-size: 12px; font-family: 'Courier New', monospace; }
        .tx .direcciones { color: #8B8270; font-size: 11px; }
        .tx .cantidad { color: #2E7D32; font-size: 13px; font-weight: 600; text-align: right; }
        
        footer {
            text-align: center; padding: 24px; 
            background: #1A1814; color: #8B8270; font-size: 12px;
        }
        footer a { color: #DAA520; text-decoration: none; }
        
        @media (max-width: 600px) {
            .bloque {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .tx {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo_direccoin.png" alt="Direccoin">
        <h1>DIRECCOIN Explorer</h1>
        <a href="index.html">← Volver al inicio</a>
    </div>

    <div class="search">
        <input type="text" placeholder="🔍 Buscar bloque #, dirección drc... o TXID..." id="searchInput">
    </div>

    <div class="container">
        <div class="stats" id="stats"></div>
        
        <div class="section-title">📦 ÚLTIMOS BLOQUES</div>
        <div id="bloques"></div>
        
        <div class="section-title" style="margin-top:24px;">🧾 TRANSACCIONES RECIENTES</div>
        <div id="transacciones"></div>
    </div>

    <footer>
        © 2026 Direccoin Explorer | 
        <a href="index.html">Inicio</a> | 
        <a href="#">API</a> | 
        <a href="#">Documentación</a>
    </footer>

    <script>
        function r(i) { return Math.floor(Math.random() * i); }
        function h() { return 'd1' + Array(62).fill(0).map(() => '0123456789abcdef'[r(16)]).join(''); }
        function drc() { return 'drc' + Array(30).fill(0).map(() => '0123456789abcdef'[r(16)]).join(''); }
        function timeAgo() { return ['1s','3s','8s','12s','25s','45s','1m','2m','5m'][r(9)] + ' atrás'; }

        // Stats
        const stats = [
            {label:'Altura', value:'#' + (15000 + r(5000)).toLocaleString()},
            {label:'Nodos', value:40 + r(60)},
            {label:'Dificultad', value:1 + r(10)},
            {label:'Gas Actual', value:'0.00000' + (1+r(9)) + ' DRC'}
        ];
        document.getElementById('stats').innerHTML = stats.map(s => 
            `<div class="stat-card"><div class="label">${s.label}</div><div class="value">${s.value}</div></div>`
        ).join('');

        // Bloques
        let bloquesHTML = '';
        for (let i = 0; i < 10; i++) {
            bloquesHTML += `
            <div class="bloque">
                <div class="indice">#${(15000 - i).toLocaleString()}</div>
                <div class="hash">${h().slice(0,24)}...</div>
                <div class="txs">${5 + r(500)} TXs</div>
                <div class="tiempo">${timeAgo()}</div>
                <div class="recompensa">+${(100 * Math.pow(0.9, i/10)).toFixed(2)} DRC</div>
            </div>`;
        }
        document.getElementById('bloques').innerHTML = bloquesHTML;

        // Transacciones
        let txHTML = '';
        for (let i = 0; i < 8; i++) {
            txHTML += `
            <div class="tx">
                <div class="txid">${h().slice(0,20)}...</div>
                <div class="direcciones">${drc().slice(0,12)}... → ${drc().slice(0,12)}...</div>
                <div class="cantidad">${(Math.random() * 10000).toFixed(2)} DRC</div>
            </div>`;
        }
        document.getElementById('transacciones').innerHTML = txHTML;
    </script>

</body>
</html>
