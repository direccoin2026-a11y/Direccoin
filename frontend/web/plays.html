<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Plays DirecCoin | Centro de Juegos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --gold: #E8B830; --accent: #FF6B4A; --bg: #0A0D14; --card: rgba(18, 21, 32, 0.9); --text: #EEF0F6; --muted: #8B8FA8; --green: #4ADE80; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .universe { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3; background: linear-gradient(170deg, #0A0D14 0%, #151928 40%, #0A0D14 100%); }
        .container { max-width: 580px; margin: 0 auto; padding: 1.5rem 1rem 3rem; position: relative; z-index: 2; }
        .header { text-align: center; margin-bottom: 2rem; }
        .header .icon { font-size: 4rem; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 0 30px rgba(232,184,48,0.5)); }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2.6rem; font-weight: 900; background: linear-gradient(135deg, #F5D06B, #E8B830, #FF6B4A); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -2px; }
        .header .sub { font-size: 0.7rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
        
        .games-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .game-card {
            background: rgba(18, 21, 32, 0.9); backdrop-filter: blur(24px);
            border-radius: 24px; padding: 2rem 1rem; text-align: center;
            border: 1px solid rgba(232,184,48,0.1); cursor: pointer;
            transition: all 0.35s cubic-bezier(0.2,0.9,0.4,1);
            position: relative; overflow: hidden;
        }
        .game-card::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 1px; background: linear-gradient(90deg, transparent, rgba(232,184,48,0.3), transparent); }
        .game-card:hover { border-color: rgba(232,184,48,0.4); transform: translateY(-6px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .game-card .game-icon { font-size: 3.5rem; margin-bottom: 0.8rem; display: block; }
        .game-card .game-title { font-weight: 700; font-size: 1rem; color: var(--gold); }
        .game-card .game-desc { font-size: 0.7rem; color: var(--muted); margin-top: 0.3rem; }
        .game-card .game-badge {
            display: inline-block; margin-top: 0.6rem; padding: 4px 12px;
            border-radius: 12px; font-size: 0.6rem; font-weight: 700;
            background: var(--green); color: #000;
        }
        .game-card.coming-soon { opacity: 0.5; pointer-events: none; }
        .game-card.coming-soon .game-badge { background: #444; color: #fff; }
        
        .btn-outline { display: inline-flex; align-items: center; gap: 0.5rem; background: transparent; color: var(--text); border: 1px solid rgba(232,184,48,0.2); padding: 0.6rem 2rem; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 0.85rem; margin-top: 2rem; text-decoration: none; }
        .text-center { text-align: center; }
    </style>
</head>
<body>
<div class="universe"></div>
<div class="container">
    <div class="header">
        <div class="icon">🎮</div>
        <h1>Plays DirecCoin</h1>
        <div class="sub">Centro de Juegos · Quema · Comunidad</div>
    </div>

    <div class="games-grid">
        <div class="game-card" onclick="window.location.href='loteria.html'">
            <span class="game-icon">🎰</span>
            <div class="game-title">Lotería</div>
            <div class="game-desc">6 números · Sábado 8PM</div>
            <span class="game-badge">JUGAR</span>
        </div>
        <div class="game-card" onclick="window.location.href='raspa.html'">
            <span class="game-icon">🎫</span>
            <div class="game-title">Raspa y Gana</div>
            <div class="game-desc">Instantáneo · 50 DRC</div>
            <span class="game-badge">¡NUEVO!</span>
        </div>
        <div class="game-card coming-soon">
            <span class="game-icon">🎁</span>
            <div class="game-title">Ruleta de Premios</div>
            <div class="game-desc">Giros gratis diarios</div>
            <span class="game-badge">PRÓXIMAMENTE</span>
        </div>
        <div class="game-card coming-soon">
            <span class="game-icon">🔮</span>
            <div class="game-title">Sorpresa</div>
            <div class="game-desc">Nuevo juego en camino</div>
            <span class="game-badge">PRÓXIMAMENTE</span>
        </div>
    </div>

    <div class="text-center">
        <button class="btn-outline" onclick="window.location.href='index.html'">← Volver a la wallet</button>
    </div>
</div>
</body>
</html>
