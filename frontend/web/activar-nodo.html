<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Activar Nodo | DirecCoin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #E8B830; --bg: #0A0D14; --text: #EEF0F6; --muted: #8B8FA8; --green: #4ADE80; --red: #F87171; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        .universe { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; background:radial-gradient(ellipse at 30% 20%, #0d1025 0%, #0A0D14 70%); }
        .container { max-width:650px; margin:0 auto; padding:1.5rem 1rem 3rem; }
        .hero { text-align:center; margin-bottom:2rem; }
        .hero-icon { font-size:4rem; animation:float 3s ease-in-out infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .hero h1 { font-family:'Space Grotesk',sans-serif; font-size:2.2rem; background:linear-gradient(135deg,#4ADE80,#22C55E); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .card { background:rgba(18,21,32,0.9); backdrop-filter:blur(20px); border-radius:20px; padding:1.5rem; margin:1rem 0; border:1px solid rgba(255,255,255,0.06); }
        .card h3 { font-size:1rem; margin-bottom:0.5rem; }
        .btn { display:block; width:100%; padding:0.9rem; border-radius:30px; font-weight:700; text-align:center; cursor:pointer; font-size:0.85rem; border:none; margin-top:0.5rem; }
        .btn-green { background:linear-gradient(135deg,#4ADE80,#22C55E); color:#000; }
        .btn-outline { background:transparent; color:var(--text); border:1px solid rgba(255,255,255,0.15); }
        input { width:100%; padding:0.8rem; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.1); border-radius:15px; color:#fff; font-size:0.85rem; margin-top:0.5rem; }
        .text-muted { color:var(--muted); font-size:0.7rem; }
        .code-box { background:#000; color:#4ADE80; padding:0.8rem; border-radius:10px; font-family:monospace; font-size:0.6rem; word-break:break-all; margin:0.5rem 0; overflow-x:auto; }
        .platform-btn { display:block; width:100%; padding:0.8rem; border-radius:14px; font-weight:700; text-align:center; cursor:pointer; font-size:0.75rem; border:none; margin:0.3rem 0; background:rgba(255,255,255,0.05); color:var(--text); border:1px solid rgba(255,255,255,0.1); }
        .platform-btn.active { border-color:var(--green); background:rgba(74,222,128,0.1); }
    </style>
</head>
<body>
<div class="universe"></div>
<div class="container">
    <div class="hero">
        <div class="hero-icon">🌐</div>
        <h1>Activar Nodo DirecCoin</h1>
        <p>Elige una plataforma y copia el comando. Sin costo.</p>
    </div>

    <div class="card">
        <h3>🚀 Plataformas gratuitas</h3>
        <p class="text-muted">Selecciona una para ver las instrucciones:</p>
        <button class="platform-btn" onclick="mostrarGuia('render')">▲ Render (recomendado)</button>
        <button class="platform-btn" onclick="mostrarGuia('fly')">🪰 Fly.io</button>
        <button class="platform-btn" onclick="mostrarGuia('railway')">🚂 Railway</button>
        <button class="platform-btn" onclick="mostrarGuia('koyeb')">🌊 Koyeb</button>
        <button class="platform-btn" onclick="mostrarGuia('cyclic')">🔄 Cyclic.sh</button>
        <button class="platform-btn" onclick="mostrarGuia('propio')">💻 Servidor Propio</button>
    </div>

    <div class="card" id="guiaContainer" style="display:none;">
        <h3 id="guiaTitulo">Instrucciones</h3>
        <div id="guiaContenido"></div>
    </div>

    <div class="card">
        <h3>📝 Registrar nodo</h3>
        <p class="text-muted">Después de desplegar, pega la URL de tu nodo:</p>
        <input type="text" id="urlNodo" placeholder="https://tu-nodo.onrender.com">
        <button class="btn btn-green" onclick="registrarNodo()">✅ Registrar nodo</button>
        <p class="text-muted" id="statusRegistro" style="margin-top:0.5rem;"></p>
    </div>

    <button class="btn btn-outline" onclick="window.location.href='index.html'">← Volver a la wallet</button>
</div>

<script>
    const GUIAS = {
        render: {
            titulo: "▲ Render (Recomendado - sin tarjeta)",
            pasos: [
                "1. Entra a <a href='https://render.com' target='_blank' style='color:#4ADE80;'>render.com</a> y regístrate con GitHub",
                "2. Haz clic en New > Web Service",
                "3. Selecciona el repositorio <b>direccoin2026-a11y/DirecCoin</b>",
                "4. Build Command: <code>pip install flask flask-cors requests</code>",
                "5. Start Command: <code>python3 api_corregida.py</code>",
                "6. Elige plan <b>Free</b> y haz clic en Deploy",
                "7. Copia la URL (ej: https://direccoin-xyz.onrender.com)"
            ]
        },
        fly: {
            titulo: "🪰 Fly.io",
            pasos: [
                "1. Entra a <a href='https://fly.io' target='_blank' style='color:#4ADE80;'>fly.io</a> y regístrate",
                "2. Instala flyctl en tu PC o usa su terminal web",
                "3. Ejecuta: <code>fly launch --image python:3.11</code>",
                "4. En el directorio del proyecto, crea el deploy",
                "5. Start Command: <code>python3 api_corregida.py</code>",
                "6. Copia la URL que te da Fly.io"
            ]
        },
        railway: {
            titulo: "🚂 Railway",
            pasos: [
                "1. Entra a <a href='https://railway.app' target='_blank' style='color:#4ADE80;'>railway.app</a> y regístrate con GitHub",
                "2. Haz clic en New Project > Deploy from GitHub repo",
                "3. Selecciona <b>direccoin2026-a11y/DirecCoin</b>",
                "4. Start Command: <code>python3 api_corregida.py</code>",
                "5. Copia la URL que te da Railway"
            ]
        },
        koyeb: {
            titulo: "🌊 Koyeb",
            pasos: [
                "1. Entra a <a href='https://koyeb.com' target='_blank' style='color:#4ADE80;'>koyeb.com</a> y regístrate con GitHub",
                "2. Haz clic en Create App > GitHub",
                "3. Selecciona <b>direccoin2026-a11y/DirecCoin</b>",
                "4. Run command: <code>python3 api_corregida.py</code>",
                "5. Copia la URL que te da Koyeb"
            ]
        },
        cyclic: {
            titulo: "🔄 Cyclic.sh",
            pasos: [
                "1. Entra a <a href='https://cyclic.sh' target='_blank' style='color:#4ADE80;'>cyclic.sh</a> y regístrate con GitHub",
                "2. Conecta el repositorio <b>direccoin2026-a11y/DirecCoin</b>",
                "3. Start Command: <code>python3 api_corregida.py</code>",
                "4. Copia la URL que te da Cyclic"
            ]
        },
        propio: {
            titulo: "💻 Servidor Propio",
            pasos: [
                "Copia y pega estos comandos en tu VPS:",
                "<div class='code-box'>git clone https://github.com/direccoin2026-a11y/DirecCoin.git<br>cd DirecCoin<br>pip install flask flask-cors requests<br>python3 api_corregida.py</div>",
                "Luego registra tu nodo con el formulario de arriba usando tu IP:8339"
            ]
        }
    };

    function mostrarGuia(platform) {
        const guia = GUIAS[platform];
        document.getElementById('guiaContainer').style.display = 'block';
        document.getElementById('guiaTitulo').textContent = guia.titulo;
        document.getElementById('guiaContenido').innerHTML = guia.pasos.map(p => `<p class="text-muted" style="margin:0.5rem 0;line-height:1.6;">${p}</p>`).join('');
        document.getElementById('guiaContainer').scrollIntoView({behavior:'smooth'});
        
        // Marcar botón activo
        document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    async function registrarNodo() {
        const url = document.getElementById('urlNodo').value.trim();
        const status = document.getElementById('statusRegistro');
        if (!url) { status.textContent = '❌ Pega la URL primero'; return; }
        const nodo = url.replace(/https?:\/\//, '').replace(/\/$/, '') + ':8339';
        status.textContent = '⏳ Verificando...';
        try {
            const check = await fetch(`https://${nodo.replace(':8339','')}/api/v1/estado`, {signal: AbortSignal.timeout(5000)});
            if (!check.ok) throw new Error('No responde');
            const r = await fetch('/api/v1/nodos/registrar', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({nodo})
            });
            const d = await r.json();
            status.textContent = d.exito ? '✅ ¡Nodo registrado!' : '❌ Error';
        } catch(e) {
            status.textContent = '❌ El nodo no responde. ¿Está desplegado?';
        }
    }
</script>
</body>
</html>
